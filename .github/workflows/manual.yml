name: Alpaca Paper Trader

on:
  schedule:
    # Times are in UTC. 14, 17, 20 UTC corresponds to 10am, 1pm, 4pm ET.
    - cron: '0 14,17,20 * * 1-5' 
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install alpaca-trade-api python-dotenv

      - name: Run Trading Bot
        env:
          # Pulls secrets from GitHub Settings, NOT the .env file
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: https://paper-api.alpaca.markets
        run: python paca.py
