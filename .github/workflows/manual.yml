name: Alpaca Trading Bot

on:
  schedule:
    # 1:50 PM ET (17:50 UTC)
    - cron: '50 17 * * 1-5'
    # 2:30 PM ET (18:30 UTC)
    - cron: '30 18 * * 1-5'
    # 4:00 PM ET (20:00 UTC)
    - cron: '0 20 * * 1-5'
  workflow_dispatch: # Allows manual run button in GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install alpaca-trade-api python-dotenv

      - name: Execute Strategy
        env:
          # This maps your Repository Secrets to the Python script
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: https://paper-api.alpaca.markets
        run: python paca.py
